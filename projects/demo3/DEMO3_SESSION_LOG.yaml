  # ──────────────────────────────────────────────────────────────
  # SIDE-EFFECT FINDING — CUSTOMER_360_MART case-mismatch fix
  # ──────────────────────────────────────────────────────────────
  side_effect_case_mismatch:
    finding: >
      ANALYTICS.CUSTOMER_360_MART was originally created in Demo 2 as an uppercase
      BASE TABLE. dbt targets lowercase schema/table names by default. DuckDB's
      quoted-identifier handling treats these as distinct names, causing a
      Compilation Error when dbt attempted to rebuild the mart during OI006 work.
    resolution: >
      DROP TABLE ANALYTICS.CUSTOMER_360_MART (approved Martin Alvarez, 2026-06-14),
      followed immediately by dbt run --select customer_360_mart which recreated the
      table as analytics.customer_360_mart (lowercase, 40 cols). Zero data gap —
      dbt creates the table atomically. ANALYTICS.CUSTOMER_360 view was untouched.
    post_fix_state:
      table_schema: ANALYTICS
      table_name: customer_360_mart
      col_count: 40
    oi005_platform_note: >
      Snowflake folds unquoted identifiers to uppercase by default; Redshift and
      PostgreSQL to lowercase; Oracle to uppercase. When executing OI005 platform
      migration, validate that dbt schema/table name casing aligns with the target
      platform's identifier behavior to avoid the same mismatch.

