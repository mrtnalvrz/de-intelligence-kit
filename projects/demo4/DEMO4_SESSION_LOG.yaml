# ──────────────────────────────────────────────────────────────
# OI005 — Case-Folding Sub-Finding (RESOLVED)
# ──────────────────────────────────────────────────────────────
oi005_case_folding_subfinding:
  status: RESOLVED
  resolved_date: 2026-06-16
  root_cause: >
    dbt/profiles.yml specified "schema: analytics" (lowercase), while
    DuckDB stores the schema as "ANALYTICS" (uppercase) in
    information_schema. dbt's load_cached_relation logic found an
    approximate case-insensitive match and refused to proceed,
    surfacing as a compilation/relation-resolution issue.
  fix_applied: >
    One-line config change in profiles.yml: "schema: analytics" ->
    "schema: ANALYTICS". Config-only — no DDL, no data risk.
  retrospective_note: >
    The Demo 3 DROP TABLE + dbt run recreate (logged as the
    side_effect_case_mismatch finding in the Demo 3 registry entry)
    is now understood to have been a one-off workaround that treated
    the symptom, not the cause. Without this profiles.yml fix, the
    same DROP+recreate pattern would have recurred on the next
    scheduled dbt run. This session closes the underlying cause
    properly.
  general_guidance_produced: >
    When migrating to or operating against a second platform, align
    profiles.yml's configured schema/table casing to whatever that
    platform actually stores in information_schema — do not assume
    a casing convention transfers between platforms. Relevant
    whenever OI005 (multi-platform migration) itself resumes.
  relationship_to_oi005: >
    This is a sub-finding under OI005, not a closure of OI005 itself.
    OI005 (multi-platform migration) remains OPEN, blocked by OI010.

# ──────────────────────────────────────────────────────────────
# PROCESS FINDING — PF-DEMO4-01 (NEW)
# ──────────────────────────────────────────────────────────────
process_finding_pf_demo4_01:
  finding_id: PF-DEMO4-01
  title: "Inline-composition bug in load-bearing edits"
  date: 2026-06-16
  description: >
    Composing edit replacement text from memory/inline within a tool
    call — rather than sourcing it from an already-verified file or
    scratch file — silently reintroduced a previously-fixed logic
    error. Occurred identically twice in this session, on the same
    test-file edit, even immediately after the correct version had
    been shown and confirmed.
  resolution: >
    Enforced scratch-file-first discipline: write intended content to
    a scratch file, read it back to verify, then copy verbatim to the
    real target — never retype or recompose inline.
  standing_recommendation: >
    Applies to any edit where logic or exact-string matching is
    load-bearing — test assertions, registry YAML, SQL WHERE clauses,
    config values — regardless of edit size. The originating near-miss
    in this session was on a small edit, not a large one, so size is
    not a reliable signal for when this discipline is needed.
  related_findings:
    - "PF-DEMO3-01 (display truncation)"
    - "PF-DEMO3-02 (genuine content duplication during registry edits)"
  classification: >
    Same family as PF-DEMO3-01/02 — verification-discipline findings
    about not trusting freshly-composed or freshly-displayed content
    without a read-back step against a known-good source.
  logged_in: "framework/PROJECT_REGISTRY.md, Process Notes (Cross-Effort)"

